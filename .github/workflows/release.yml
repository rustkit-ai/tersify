name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tersify

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tersify-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tersify-x86_64-apple-darwin.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tersify-x86_64-unknown-linux-musl.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tersify-aarch64-unknown-linux-musl.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: tersify-x86_64-pc-windows-msvc.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update -y && sudo apt-get install -y musl-tools

      - name: Install musl tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          # Disable glibc fortification — aarch64-linux-gnu-gcc is a glibc cross-compiler
          # but the target is musl, so __fprintf_chk/__snprintf_chk are unavailable.
          echo "CFLAGS=-D_FORTIFY_SOURCE=0" >> $GITHUB_ENV
          echo "CXXFLAGS=-D_FORTIFY_SOURCE=0" >> $GITHUB_ENV

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} .
          tar czf ${{ matrix.archive }} ${{ env.BINARY_NAME }} README.md LICENSE
          sha256sum ${{ matrix.archive }} > ${{ matrix.archive }}.sha256

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe" .
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe", "README.md", "LICENSE" -DestinationPath "${{ matrix.archive }}"
          $hash = (Get-FileHash "${{ matrix.archive }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.archive }}" | Out-File -Encoding ascii "${{ matrix.archive }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy install script
        run: cp install.sh artifacts/install.sh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: tersify ${{ github.ref_name }}
          body: |
            ## Install

            **Homebrew (macOS / Linux)**
            ```bash
            brew tap rustkit-ai/tap
            brew install tersify
            ```

            **One-liner (macOS / Linux)**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/rustkit-ai/tersify/main/install.sh | bash
            ```
            Downloads the binary, adds it to `~/.local/bin`, and hooks into all detected AI editors automatically.

            **Cargo**
            ```bash
            cargo install tersify
            tersify install --all
            ```

            **Direct download** — pick the archive for your platform below, verify the `.sha256`, put the binary on your `$PATH`, then run `tersify install --all`.

            See [CHANGELOG](https://github.com/rustkit-ai/tersify/blob/main/CHANGELOG.md) for what changed.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.sha256
            artifacts/install.sh

  homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compute SHA256 for each binary
        id: sha
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/rustkit-ai/tersify/releases/download/${GITHUB_REF_NAME}"

          fetch_sha() {
            curl -fsSL "$1.sha256" | awk '{print $1}'
          }

          echo "version=$VERSION"                                                                             >> $GITHUB_OUTPUT
          echo "aarch64_darwin=$(fetch_sha $BASE/tersify-aarch64-apple-darwin.tar.gz)"                       >> $GITHUB_OUTPUT
          echo "x86_64_darwin=$(fetch_sha $BASE/tersify-x86_64-apple-darwin.tar.gz)"                         >> $GITHUB_OUTPUT
          echo "aarch64_linux=$(fetch_sha $BASE/tersify-aarch64-unknown-linux-musl.tar.gz)"                   >> $GITHUB_OUTPUT
          echo "x86_64_linux=$(fetch_sha $BASE/tersify-x86_64-unknown-linux-musl.tar.gz)"                     >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: rustkit-ai/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        run: |
          F="tap/Formula/tersify.rb"
          sed -i "s/version \".*\"/version \"${{ steps.sha.outputs.version }}\"/"   "$F"
          sed -i "s/PLACEHOLDER_AARCH64_DARWIN/${{ steps.sha.outputs.aarch64_darwin }}/"  "$F"
          sed -i "s/PLACEHOLDER_X86_64_DARWIN/${{ steps.sha.outputs.x86_64_darwin }}/"    "$F"
          sed -i "s/PLACEHOLDER_AARCH64_LINUX/${{ steps.sha.outputs.aarch64_linux }}/"    "$F"
          sed -i "s/PLACEHOLDER_X86_64_LINUX/${{ steps.sha.outputs.x86_64_linux }}/"      "$F"

      - name: Commit + push to tap
        working-directory: tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/tersify.rb
          git commit -m "tersify ${{ steps.sha.outputs.version }}"
          git push
